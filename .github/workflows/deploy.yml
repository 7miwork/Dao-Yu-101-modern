name: Dao-Yu-101 Industrial Deploy

on:
  push:
    branches:
      - "**"

jobs:
  preview-validation:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect framework
        run: |
          if [ ! -f "package.json" ]; then
            echo "package.json missing"
            exit 1
          fi
          if grep -q "\"vite\"" package.json && grep -q "\"@vitejs/plugin-react\"" package.json; then
            echo "Detected: Vite React"
          elif grep -q "\"react-scripts\"" package.json; then
            echo "Detected: CRA fallback"
          elif grep -q "\"next\"" package.json; then
            echo "Detected: Next.js future stub"
          else
            echo "Framework detection failed"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Validation
        run: npm run build

      - name: Validate Build Output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist missing"
            exit 1
          fi

  deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect framework
        run: |
          if [ ! -f "package.json" ]; then
            echo "package.json missing"
            exit 1
          fi
          if grep -q "\"vite\"" package.json && grep -q "\"@vitejs/plugin-react\"" package.json; then
            echo "Detected: Vite React"
          elif grep -q "\"react-scripts\"" package.json; then
            echo "Detected: CRA fallback"
          elif grep -q "\"next\"" package.json; then
            echo "Detected: Next.js future stub"
          else
            echo "Framework detection failed"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Validate Build Output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist missing"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
